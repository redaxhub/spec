<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="690" viewBox="0 0 1200 690" role="img" aria-labelledby="title desc">
  <title id="title">REDAX Hub holder convert UI flow</title>
  <desc id="desc">User-facing flow for a holder reviewing campaign status, inputs, governance, fee information, disclosures, confirmation, and result state.</desc>
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .title { fill: #0f172a; font: 700 26px Arial, sans-serif; }
      .subtitle { fill: #475569; font: 400 14px Arial, sans-serif; }
      .screen { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; filter: url(#shadow); }
      .screen-blue { fill: #eff6ff; stroke: #93c5fd; stroke-width: 1.7; filter: url(#shadow); }
      .screen-amber { fill: #fffbeb; stroke: #fcd34d; stroke-width: 1.7; filter: url(#shadow); }
      .screen-green { fill: #ecfdf5; stroke: #86efac; stroke-width: 1.7; filter: url(#shadow); }
      .head { fill: #0f172a; font: 700 15px Arial, sans-serif; }
      .body { fill: #475569; font: 400 12px Arial, sans-serif; }
      .strong { fill: #0f172a; font: 700 12px Arial, sans-serif; }
      .tab { fill: #f8fafc; stroke: #e2e8f0; stroke-width: 1; }
      .button { fill: #2563eb; }
      .button-text { fill: #ffffff; font: 700 12px Arial, sans-serif; }
      .arrow { fill: none; stroke: #2563eb; stroke-width: 2.2; marker-end: url(#arrow); }
      .arrow-muted { fill: none; stroke: #64748b; stroke-width: 2; marker-end: url(#arrow-muted); }
    </style>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="125%">
      <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#0f172a" flood-opacity=".08" />
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#2563eb" />
    </marker>
    <marker id="arrow-muted" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#64748b" />
    </marker>
  </defs>

  <rect class="bg" width="1200" height="690" />
  <text class="title" x="60" y="54">Holder convert UI flow</text>
  <text class="subtitle" x="60" y="80">The UI must make status, governance, fee, and finality information visible before signing.</text>

  <g transform="translate(70 132)">
    <rect class="screen-blue" width="230" height="170" rx="18" />
    <rect class="tab" x="20" y="24" width="190" height="28" rx="8" />
    <text class="head" x="115" y="44" text-anchor="middle">Campaign page</text>
    <text class="body" x="32" y="82">Review status badge</text>
    <text class="body" x="32" y="106">SingleProjectMigration</text>
    <text class="body" x="32" y="130">ProgramCreatedOutputMint</text>
    <text class="body" x="32" y="154">SPL Token output</text>
  </g>

  <g transform="translate(360 132)">
    <rect class="screen-amber" width="230" height="170" rx="18" />
    <rect class="tab" x="20" y="24" width="190" height="28" rx="8" />
    <text class="head" x="115" y="44" text-anchor="middle">Warning gate</text>
    <text class="body" x="32" y="84">Shown for unreviewed</text>
    <text class="body" x="32" y="108">direct-link campaigns</text>
    <text class="body" x="32" y="132">requires holder</text>
    <text class="body" x="32" y="152">acknowledgment</text>
  </g>

  <g transform="translate(650 132)">
    <rect class="screen" width="230" height="170" rx="18" />
    <rect class="tab" x="20" y="24" width="190" height="28" rx="8" />
    <text class="head" x="115" y="44" text-anchor="middle">Input and quote</text>
    <text class="body" x="32" y="82">Legacy token input</text>
    <text class="body" x="32" y="106">Conversion rate</text>
    <text class="body" x="32" y="130">Expected output</text>
    <text class="body" x="32" y="154">Slippage and finality info</text>
  </g>

  <g transform="translate(940 132)">
    <rect class="screen" width="190" height="170" rx="18" />
    <rect class="tab" x="20" y="24" width="150" height="28" rx="8" />
    <text class="head" x="95" y="44" text-anchor="middle">Campaign info</text>
    <text class="body" x="28" y="82">output_governance</text>
    <text class="body" x="28" y="106">campaign_admin</text>
    <text class="body" x="28" y="130">protocol_fee_vault</text>
    <text class="body" x="28" y="154">metadata source</text>
  </g>

  <g transform="translate(190 390)">
    <rect class="screen" width="250" height="170" rx="18" />
    <rect class="tab" x="20" y="24" width="210" height="28" rx="8" />
    <text class="head" x="125" y="44" text-anchor="middle">Fee and disclosures</text>
    <text class="body" x="34" y="82">1% output fee</text>
    <text class="body" x="34" y="106">fee route to protocol_fee_vault</text>
    <text class="body" x="34" y="130">freeze_authority = None</text>
    <text class="body" x="34" y="154">conversion is irreversible</text>
  </g>

  <g transform="translate(520 390)">
    <rect class="screen-blue" width="230" height="170" rx="18" />
    <rect class="tab" x="20" y="24" width="190" height="28" rx="8" />
    <text class="head" x="115" y="44" text-anchor="middle">Confirm convert</text>
    <text class="body" x="34" y="82">holder reviews details</text>
    <text class="body" x="34" y="106">wallet transaction opens</text>
    <rect class="button" x="48" y="130" width="134" height="30" rx="15" />
    <text class="button-text" x="115" y="150" text-anchor="middle">Sign convert</text>
  </g>

  <g transform="translate(830 390)">
    <rect class="screen-green" width="230" height="170" rx="18" />
    <rect class="tab" x="20" y="24" width="190" height="28" rx="8" />
    <text class="head" x="115" y="44" text-anchor="middle">Result state</text>
    <text class="body" x="34" y="82">legacy token burned</text>
    <text class="body" x="34" y="106">output token received</text>
    <text class="body" x="34" y="130">event indexed</text>
    <text class="body" x="34" y="154">receipt visible</text>
  </g>

  <path class="arrow" d="M300 217 H358" />
  <path class="arrow" d="M590 217 H648" />
  <path class="arrow" d="M880 217 H938" />
  <path class="arrow-muted" d="M1035 302 V342 C1035 362 394 358 394 388" />
  <path class="arrow" d="M440 475 H518" />
  <path class="arrow" d="M750 475 H828" />

  <rect x="72" y="612" width="1056" height="42" rx="13" fill="#f8fafc" stroke="#cbd5e1" />
  <text class="strong" x="96" y="638">Required display before signing:</text>
  <text class="body" x="290" y="638">governance addresses, fee route, review status, output metadata, and irreversible conversion notice.</text>
</svg>
