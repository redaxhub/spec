<svg xmlns="http://www.w3.org/2000/svg" width="800" height="260" viewBox="0 0 800 260">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#111" />
    </marker>
  </defs>
  <rect x="40" y="60" width="220" height="60" fill="#fff" stroke="#111" />
  <text x="150" y="95" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">Warning banner</text>

  <rect x="300" y="60" width="220" height="60" fill="#fff" stroke="#111" />
  <text x="410" y="95" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">Campaign info block</text>

  <rect x="560" y="60" width="200" height="60" fill="#fff" stroke="#111" />
  <text x="660" y="95" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">User signs</text>

  <line x1="260" y1="90" x2="300" y2="90" stroke="#111" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="520" y1="90" x2="560" y2="90" stroke="#111" stroke-width="2" marker-end="url(#arrow)" />
</svg>
