<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">REDAX Hub PDA hierarchy and authority boundaries</title>
  <desc id="desc">Information-rich Phase 1 PDA hierarchy showing on-protocol accounts, off-protocol governance addresses, technical authority, economic ownership, output mint configuration, metadata account, and fee-vault separation.</desc>
  <defs>
    <style>
      .title { fill:#0f172a; font:700 32px Arial, sans-serif; }
      .subtitle { fill:#475569; font:400 15px Arial, sans-serif; }
      .lane-title { fill:#334155; font:700 13px Arial, sans-serif; letter-spacing:.08em; }
      .card-title { fill:#0f172a; font:700 15px Arial, sans-serif; }
      .card-text { fill:#475569; font:400 12px Arial, sans-serif; }
      .small { fill:#64748b; font:400 11px Arial, sans-serif; }
      .tiny { fill:#64748b; font:400 10px Arial, sans-serif; }
      .tag { fill:#334155; font:700 10px Arial, sans-serif; letter-spacing:.04em; }
      .lane { fill:#f8fafc; stroke:#cbd5e1; stroke-width:1.5; }
      .lane-off { fill:#f0fdf4; stroke:#bbf7d0; stroke-width:1.5; }
      .card { fill:#ffffff; stroke:#cbd5e1; stroke-width:1.5; }
      .blue { fill:#eff6ff; stroke:#93c5fd; stroke-width:1.8; }
      .green { fill:#ecfdf5; stroke:#86efac; stroke-width:1.8; }
      .amber { fill:#fffbeb; stroke:#fcd34d; stroke-width:1.8; }
      .rose { fill:#fff1f2; stroke:#fda4af; stroke-width:1.5; }
      .violet { fill:#f5f3ff; stroke:#c4b5fd; stroke-width:1.6; }
      .arrow { fill:none; stroke:#2563eb; stroke-width:2.2; marker-end:url(#arrow-blue); }
      .arrow-green { fill:none; stroke:#059669; stroke-width:2.2; marker-end:url(#arrow-green); }
      .arrow-muted { fill:none; stroke:#64748b; stroke-width:2; marker-end:url(#arrow-muted); }
      .arrow-amber { fill:none; stroke:#d97706; stroke-width:2; marker-end:url(#arrow-amber); }
      .dash { fill:none; stroke:#64748b; stroke-width:1.8; stroke-dasharray:7 7; marker-end:url(#arrow-muted); }
      .divider { stroke:#94a3b8; stroke-width:1.4; stroke-dasharray:8 8; }
    </style>
    <marker id="arrow-blue" markerWidth="11" markerHeight="11" refX="10" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="11" markerHeight="11" refX="10" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#059669"/>
    </marker>
    <marker id="arrow-muted" markerWidth="11" markerHeight="11" refX="10" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#64748b"/>
    </marker>
    <marker id="arrow-amber" markerWidth="11" markerHeight="11" refX="10" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#d97706"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>

  <text class="title" x="64" y="58">PDA hierarchy and authority boundaries</text>
  <text class="subtitle" x="64" y="86">On-protocol execution is separated from Off-protocol governance, treasury, and operational identities.</text>

  <rect class="lane" x="52" y="122" width="1056" height="730" rx="22"/>
  <text class="lane-title" x="84" y="156">ON-PROTOCOL</text>
  <line class="divider" x1="352" y1="182" x2="352" y2="792"/>
  <line class="divider" x1="726" y1="182" x2="726" y2="792"/>
  <text class="lane-title" x="88" y="194">INPUTS AND HOLDER STATE</text>
  <text class="lane-title" x="386" y="194">REDAX PROGRAM ACCOUNTS</text>
  <text class="lane-title" x="760" y="194">TOKEN AND METADATA ACCOUNTS</text>

  <rect class="lane-off" x="1142" y="122" width="406" height="730" rx="22"/>
  <text class="lane-title" x="1174" y="156">OFF-PROTOCOL</text>
  <text class="small" x="1174" y="182">Project governance, project treasury, and campaign operator keys</text>

  <rect class="card" x="88" y="232" width="218" height="82" rx="14"/>
  <text class="card-title" x="197" y="264" text-anchor="middle">holder</text>
  <text class="card-text" x="197" y="288" text-anchor="middle">signs convert_exact_in</text>
  <text class="tiny" x="197" y="307" text-anchor="middle">owns source and destination ATAs</text>

  <rect class="amber" x="88" y="360" width="218" height="92" rx="14"/>
  <text class="card-title" x="197" y="392" text-anchor="middle">legacy_mint</text>
  <text class="card-text" x="197" y="416" text-anchor="middle">accepted source asset</text>
  <text class="tiny" x="197" y="436" text-anchor="middle">validated against TokenConfig</text>

  <rect class="card" x="88" y="498" width="218" height="86" rx="14"/>
  <text class="card-title" x="197" y="530" text-anchor="middle">user legacy ATA</text>
  <text class="card-text" x="197" y="554" text-anchor="middle">input balance</text>
  <text class="tiny" x="197" y="574" text-anchor="middle">burn source in conversion</text>

  <rect class="blue" x="388" y="228" width="276" height="96" rx="15"/>
  <text class="card-title" x="526" y="262" text-anchor="middle">ProtocolConfig</text>
  <text class="card-text" x="526" y="286" text-anchor="middle">global protocol guardrails</text>
  <text class="tiny" x="526" y="306" text-anchor="middle">fee settings, owner multisig, paused flag</text>

  <rect class="blue" x="388" y="374" width="276" height="144" rx="16"/>
  <text class="card-title" x="526" y="408" text-anchor="middle">Campaign PDA</text>
  <text class="card-text" x="526" y="432" text-anchor="middle">Technical authority</text>
  <text class="tiny" x="526" y="452" text-anchor="middle">mint authority for output_mint only</text>
  <text class="tiny" x="526" y="470" text-anchor="middle">enforces cap, phase mode, status, counters</text>
  <rect x="448" y="488" width="156" height="22" rx="11" fill="#dbeafe"/>
  <text class="tag" x="526" y="503" text-anchor="middle">Campaign PDA</text>

  <rect class="violet" x="388" y="568" width="276" height="108" rx="15"/>
  <text class="card-title" x="526" y="602" text-anchor="middle">TokenConfig</text>
  <text class="card-text" x="526" y="626" text-anchor="middle">per-legacy-mint conversion config</text>
  <text class="tiny" x="526" y="646" text-anchor="middle">rate, cap_in, total_in, dust tracking</text>
  <text class="tiny" x="526" y="664" text-anchor="middle">lookup keyed by campaign + legacy_mint</text>

  <rect class="green" x="388" y="718" width="276" height="86" rx="15"/>
  <text class="card-title" x="526" y="750" text-anchor="middle">protocol_fee_vault</text>
  <text class="card-text" x="526" y="774" text-anchor="middle">REDAX fee vault</text>
  <text class="tiny" x="526" y="794" text-anchor="middle">program-controlled, not project_treasury</text>

  <rect class="blue" x="770" y="272" width="282" height="128" rx="16"/>
  <text class="card-title" x="911" y="306" text-anchor="middle">output_mint</text>
  <text class="card-text" x="911" y="330" text-anchor="middle">SPL Token output mint</text>
  <text class="tiny" x="911" y="352" text-anchor="middle">mint_authority = Campaign PDA</text>
  <text class="tiny" x="911" y="372" text-anchor="middle">freeze_authority = None</text>
  <text class="tiny" x="911" y="390" text-anchor="middle">ProgramCreatedOutputMint</text>

  <rect class="card" x="770" y="452" width="282" height="118" rx="15"/>
  <text class="card-title" x="911" y="486" text-anchor="middle">metadata_account</text>
  <text class="card-text" x="911" y="510" text-anchor="middle">Metaplex metadata CPI</text>
  <text class="tiny" x="911" y="532" text-anchor="middle">name, symbol, uri pointer</text>
  <text class="tiny" x="911" y="550" text-anchor="middle">update authority: output_governance</text>

  <rect class="card" x="770" y="622" width="282" height="102" rx="15"/>
  <text class="card-title" x="911" y="654" text-anchor="middle">created atomically</text>
  <text class="card-text" x="911" y="678" text-anchor="middle">Campaign PDA + output_mint</text>
  <text class="tiny" x="911" y="698" text-anchor="middle">metadata_account in same transaction</text>

  <rect class="amber" x="1190" y="232" width="306" height="96" rx="15"/>
  <text class="card-title" x="1343" y="266" text-anchor="middle">campaign_admin</text>
  <text class="card-text" x="1343" y="290" text-anchor="middle">operational authority</text>
  <text class="tiny" x="1343" y="310" text-anchor="middle">pause, unpause, finalize, admin actions</text>

  <rect class="green" x="1190" y="388" width="306" height="126" rx="16"/>
  <text class="card-title" x="1343" y="422" text-anchor="middle">output_governance</text>
  <text class="card-text" x="1343" y="446" text-anchor="middle">Economic ownership</text>
  <text class="tiny" x="1343" y="468" text-anchor="middle">project governance destination</text>
  <text class="tiny" x="1343" y="486" text-anchor="middle">controls metadata updates</text>
  <text class="tiny" x="1343" y="504" text-anchor="middle">controls economic/project side</text>

  <rect class="green" x="1190" y="574" width="306" height="106" rx="15"/>
  <text class="card-title" x="1343" y="608" text-anchor="middle">project_treasury</text>
  <text class="card-text" x="1343" y="632" text-anchor="middle">external/off-protocol address</text>
  <text class="tiny" x="1343" y="652" text-anchor="middle">selected and controlled by output_governance</text>

  <rect class="rose" x="1190" y="732" width="306" height="72" rx="14"/>
  <text class="card-title" x="1343" y="762" text-anchor="middle">not REDAX fee custody</text>
  <text class="tiny" x="1343" y="784" text-anchor="middle">protocol_fee_vault remains separate</text>

  <path class="arrow-muted" d="M306 273 H386"/>
  <path class="arrow-muted" d="M306 406 H360 C372 406 378 432 388 442"/>
  <path class="arrow-muted" d="M306 541 H342 C366 541 374 612 388 622"/>
  <path class="arrow" d="M526 324 V372"/>
  <path class="arrow" d="M526 518 V566"/>
  <path class="arrow-green" d="M526 518 C526 584 526 650 526 716"/>
  <path class="arrow" d="M664 446 H768"/>
  <path class="arrow" d="M664 622 C714 602 728 534 768 516"/>
  <path class="arrow-muted" d="M911 400 V450"/>
  <path class="arrow-muted" d="M1190 280 H1060 C1030 280 1012 304 1052 328"/>
  <path class="arrow-green" d="M1190 450 H1056"/>
  <path class="arrow-green" d="M1343 514 V572"/>
  <path class="dash" d="M1052 511 H1188"/>
  <path class="dash" d="M664 762 H1188"/>

  <rect class="card" x="84" y="878" width="1432" height="78" rx="18"/>
  <text class="lane-title" x="112" y="908">LEGEND / PHASE 1 NOTE</text>
  <circle cx="116" cy="932" r="6" fill="#2563eb"/><text class="small" x="130" y="936">Technical authority / program action</text>
  <circle cx="370" cy="932" r="6" fill="#059669"/><text class="small" x="384" y="936">Economic ownership / governance control</text>
  <circle cx="664" cy="932" r="6" fill="#64748b"/><text class="small" x="678" y="936">Reference or operational relationship</text>
  <text class="small" x="936" y="936">Phase 1: SingleProjectMigration only, MetaplexMetadataCPI only, SPL Token output only.</text>
</svg>
