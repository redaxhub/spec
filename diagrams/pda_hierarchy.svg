<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">REDAX Hub PDA hierarchy and authority boundaries</title>
  <desc id="desc">Account and authority relationships for REDAX Hub Phase 1, separating on-protocol accounts from external governance and treasury addresses.</desc>
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .title { fill: #0f172a; font: 700 26px Arial, sans-serif; }
      .subtitle { fill: #475569; font: 400 14px Arial, sans-serif; }
      .lane-title { fill: #334155; font: 700 13px Arial, sans-serif; letter-spacing: .06em; }
      .box-title { fill: #0f172a; font: 700 15px Arial, sans-serif; }
      .box-text { fill: #475569; font: 400 12px Arial, sans-serif; }
      .small { fill: #64748b; font: 400 11px Arial, sans-serif; }
      .pill { fill: #334155; font: 700 11px Arial, sans-serif; letter-spacing: .04em; }
      .lane-on { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.5; }
      .lane-off { fill: #f7fee7; stroke: #bbf7d0; stroke-width: 1.5; }
      .card { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; }
      .card-blue { fill: #eff6ff; stroke: #93c5fd; stroke-width: 1.7; }
      .card-green { fill: #ecfdf5; stroke: #86efac; stroke-width: 1.7; }
      .card-amber { fill: #fffbeb; stroke: #fcd34d; stroke-width: 1.7; }
      .card-slate { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.7; }
      .arrow { fill: none; stroke: #2563eb; stroke-width: 2; marker-end: url(#arrow-blue); }
      .arrow-muted { fill: none; stroke: #64748b; stroke-width: 2; marker-end: url(#arrow-muted); }
      .arrow-green { fill: none; stroke: #059669; stroke-width: 2; marker-end: url(#arrow-green); }
      .arrow-dashed { fill: none; stroke: #64748b; stroke-width: 2; stroke-dasharray: 6 6; marker-end: url(#arrow-muted); }
    </style>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#2563eb" />
    </marker>
    <marker id="arrow-muted" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#64748b" />
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#059669" />
    </marker>
  </defs>

  <rect class="bg" width="1200" height="760" />
  <text class="title" x="60" y="54">PDA hierarchy and authority boundaries</text>
  <text class="subtitle" x="60" y="80">Phase 1 account map: technical mint authority is separated from economic ownership.</text>

  <rect class="lane-on" x="54" y="118" width="760" height="560" rx="18" />
  <text class="lane-title" x="78" y="150">ON-CHAIN CAMPAIGN EXECUTION</text>
  <line x1="344" y1="170" x2="344" y2="578" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="7 7" />
  <text class="lane-title" x="90" y="182">EXTERNAL INPUTS</text>
  <text class="lane-title" x="390" y="182">REDAX PROGRAM ACCOUNTS</text>

  <rect class="lane-off" x="850" y="118" width="300" height="560" rx="18" />
  <text class="lane-title" x="874" y="150">EXTERNAL / OFF-PROTOCOL</text>

  <rect class="card-slate" x="90" y="204" width="220" height="90" rx="14" />
  <text class="box-title" x="200" y="238" text-anchor="middle">Holder / user</text>
  <text class="box-text" x="200" y="261" text-anchor="middle">signs convert_exact_in</text>

  <rect class="card-slate" x="90" y="420" width="220" height="90" rx="14" />
  <text class="box-title" x="200" y="454" text-anchor="middle">Legacy token mint</text>
  <text class="box-text" x="200" y="477" text-anchor="middle">accepted input asset</text>

  <rect class="card-blue" x="390" y="272" width="260" height="132" rx="16" />
  <text class="box-title" x="520" y="306" text-anchor="middle">Campaign PDA</text>
  <text class="box-text" x="520" y="331" text-anchor="middle">technical mint authority</text>
  <text class="box-text" x="520" y="352" text-anchor="middle">bounded by total output cap</text>
  <rect x="446" y="368" width="148" height="24" rx="12" fill="#dbeafe" />
  <text class="pill" x="520" y="384" text-anchor="middle">PHASE 1 SCOPE</text>

  <rect class="card" x="390" y="524" width="260" height="90" rx="14" />
  <text class="box-title" x="520" y="558" text-anchor="middle">protocol_fee_vault</text>
  <text class="box-text" x="520" y="581" text-anchor="middle">REDAX 1% output fee</text>

  <rect class="card" x="390" y="160" width="260" height="82" rx="14" />
  <text class="box-title" x="520" y="192" text-anchor="middle">Metaplex metadata</text>
  <text class="box-text" x="520" y="215" text-anchor="middle">update authority: output_governance</text>

  <rect class="card-blue" x="70" y="602" width="250" height="44" rx="12" />
  <text class="small" x="195" y="629" text-anchor="middle">SingleProjectMigration only</text>

  <rect class="card-blue" x="338" y="602" width="250" height="44" rx="12" />
  <text class="small" x="463" y="629" text-anchor="middle">ProgramCreatedOutputMint only</text>

  <rect class="card-blue" x="606" y="602" width="180" height="44" rx="12" />
  <text class="small" x="696" y="629" text-anchor="middle">SPL Token output</text>

  <rect class="card-blue" x="675" y="272" width="100" height="132" rx="16" />
  <text class="box-title" x="725" y="322" text-anchor="middle">Output</text>
  <text class="box-title" x="725" y="342" text-anchor="middle">mint</text>
  <text class="box-text" x="725" y="370" text-anchor="middle">freeze:</text>
  <text class="box-text" x="725" y="388" text-anchor="middle">None</text>

  <rect class="card-amber" x="890" y="188" width="220" height="88" rx="14" />
  <text class="box-title" x="1000" y="220" text-anchor="middle">campaign_admin</text>
  <text class="box-text" x="1000" y="244" text-anchor="middle">pause / finalize / ops</text>

  <rect class="card-green" x="890" y="340" width="220" height="96" rx="14" />
  <text class="box-title" x="1000" y="374" text-anchor="middle">output_governance</text>
  <text class="box-text" x="1000" y="398" text-anchor="middle">economic owner</text>
  <text class="box-text" x="1000" y="417" text-anchor="middle">metadata update authority</text>

  <rect class="card-green" x="890" y="520" width="220" height="88" rx="14" />
  <text class="box-title" x="1000" y="552" text-anchor="middle">project_treasury</text>
  <text class="box-text" x="1000" y="576" text-anchor="middle">external and off-protocol</text>

  <path class="arrow" d="M310 249 H374" />
  <path class="arrow-muted" d="M310 465 H360 C374 465 382 452 390 434 L416 386" />
  <path class="arrow" d="M650 338 H672" />
  <path class="arrow" d="M520 404 V520" />
  <path class="arrow-green" d="M890 388 H792 C776 388 768 374 775 360" />
  <path class="arrow-green" d="M1000 436 V516" />
  <path class="arrow-muted" d="M890 232 H762 C706 232 664 270 650 306" />
  <path class="arrow-dashed" d="M650 202 H884" />

  <rect x="820" y="690" width="330" height="40" rx="12" fill="#f8fafc" stroke="#cbd5e1" />
  <circle cx="846" cy="710" r="5" fill="#2563eb" />
  <text class="small" x="858" y="714">program action</text>
  <circle cx="958" cy="710" r="5" fill="#059669" />
  <text class="small" x="970" y="714">economic control</text>
  <circle cx="1088" cy="710" r="5" fill="#64748b" />
  <text class="small" x="1100" y="714">operational/reference</text>
</svg>
