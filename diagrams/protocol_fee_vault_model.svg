<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">REDAX Hub protocol_fee_vault fee-boundary model</title>
  <desc id="desc">Fee boundary diagram showing holder conversion, gross output, 1 percent protocol fee, user_out, fee_out, protocol_fee_vault, REDAX fee vault separation from project_treasury, and output_governance control of the project treasury.</desc>
  <defs>
    <style>
      .title { fill:#0f172a; font:700 32px Arial, sans-serif; }
      .subtitle { fill:#475569; font:400 15px Arial, sans-serif; }
      .lane-title { fill:#334155; font:700 13px Arial, sans-serif; letter-spacing:.08em; }
      .label { fill:#0f172a; font:700 14px Arial, sans-serif; }
      .body { fill:#475569; font:400 12px Arial, sans-serif; }
      .small { fill:#64748b; font:400 11px Arial, sans-serif; }
      .lane { fill:#f8fafc; stroke:#cbd5e1; stroke-width:1.5; }
      .lane-green { fill:#f0fdf4; stroke:#bbf7d0; stroke-width:1.5; }
      .card { fill:#ffffff; stroke:#cbd5e1; stroke-width:1.5; }
      .blue { fill:#eff6ff; stroke:#93c5fd; stroke-width:1.8; }
      .green { fill:#ecfdf5; stroke:#86efac; stroke-width:1.8; }
      .amber { fill:#fffbeb; stroke:#fcd34d; stroke-width:1.8; }
      .violet { fill:#f5f3ff; stroke:#c4b5fd; stroke-width:1.8; }
      .rose { fill:#fff1f2; stroke:#fda4af; stroke-width:1.8; }
      .arrow { fill:none; stroke:#2563eb; stroke-width:2.2; marker-end:url(#arrow-blue); }
      .arrow-green { fill:none; stroke:#059669; stroke-width:2.2; marker-end:url(#arrow-green); }
      .arrow-amber { fill:none; stroke:#d97706; stroke-width:2.2; marker-end:url(#arrow-amber); }
      .arrow-muted { fill:none; stroke:#64748b; stroke-width:2; marker-end:url(#arrow-muted); }
      .boundary { stroke:#94a3b8; stroke-width:1.6; stroke-dasharray:9 8; }
    </style>
    <marker id="arrow-blue" markerWidth="11" markerHeight="11" refX="10" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="11" markerHeight="11" refX="10" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#059669"/>
    </marker>
    <marker id="arrow-amber" markerWidth="11" markerHeight="11" refX="10" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#d97706"/>
    </marker>
    <marker id="arrow-muted" markerWidth="11" markerHeight="11" refX="10" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>

  <text class="title" x="64" y="58">protocol_fee_vault fee-boundary model</text>
  <text class="subtitle" x="64" y="86">The REDAX protocol fee path is isolated from the project's external treasury path.</text>

  <rect class="lane" x="54" y="126" width="1048" height="680" rx="22"/>
  <text class="lane-title" x="88" y="160">REDAX PROGRAM SETTLEMENT PATH</text>
  <rect class="blue" x="94" y="232" width="190" height="92" rx="15"/>
  <text class="label" x="189" y="266" text-anchor="middle">Holder conversion</text>
  <text class="body" x="189" y="290" text-anchor="middle">convert_exact_in</text>
  <text class="small" x="189" y="310" text-anchor="middle">legacy input selected</text>

  <rect class="violet" x="344" y="232" width="206" height="92" rx="15"/>
  <text class="label" x="447" y="266" text-anchor="middle">Gross output</text>
  <text class="body" x="447" y="290" text-anchor="middle">Precision Sandwich result</text>
  <text class="small" x="447" y="310" text-anchor="middle">before fee split</text>

  <rect class="amber" x="616" y="160" width="218" height="94" rx="15"/>
  <text class="label" x="725" y="194" text-anchor="middle">1% protocol fee</text>
  <text class="body" x="725" y="218" text-anchor="middle">fee_out</text>
  <text class="small" x="725" y="238" text-anchor="middle">computed from output amount</text>

  <rect class="blue" x="616" y="338" width="218" height="94" rx="15"/>
  <text class="label" x="725" y="372" text-anchor="middle">holder receives</text>
  <text class="body" x="725" y="396" text-anchor="middle">user_out</text>
  <text class="small" x="725" y="416" text-anchor="middle">net SPL output tokens</text>

  <rect class="green" x="616" y="520" width="218" height="110" rx="16"/>
  <text class="label" x="725" y="554" text-anchor="middle">protocol_fee_vault</text>
  <text class="body" x="725" y="578" text-anchor="middle">REDAX fee vault</text>
  <text class="small" x="725" y="600" text-anchor="middle">Not the project treasury</text>
  <text class="small" x="725" y="618" text-anchor="middle">program-controlled custody</text>

  <rect class="card" x="886" y="520" width="170" height="110" rx="15"/>
  <text class="label" x="971" y="554" text-anchor="middle">treasury_policy</text>
  <text class="body" x="971" y="578" text-anchor="middle">locked at creation</text>
  <text class="small" x="971" y="600" text-anchor="middle">Hold / Vest / LP / Mixed</text>

  <rect class="card" x="94" y="674" width="962" height="76" rx="15"/>
  <text class="lane-title" x="122" y="704">FEE BOUNDARY</text>
  <text class="small" x="122" y="728">fee_out routes only to protocol_fee_vault. user_out routes only to the holder's output token account. Project funds are outside this path.</text>

  <rect class="lane-green" x="1150" y="126" width="398" height="680" rx="22"/>
  <text class="lane-title" x="1184" y="160">PROJECT TREASURY PATH</text>
  <rect class="green" x="1192" y="232" width="312" height="112" rx="16"/>
  <text class="label" x="1348" y="266" text-anchor="middle">output_governance</text>
  <text class="body" x="1348" y="290" text-anchor="middle">controls project_treasury</text>
  <text class="small" x="1348" y="312" text-anchor="middle">no REDAX control over project_treasury</text>
  <rect class="green" x="1192" y="424" width="312" height="112" rx="16"/>
  <text class="label" x="1348" y="458" text-anchor="middle">project_treasury</text>
  <text class="body" x="1348" y="482" text-anchor="middle">External/off-protocol</text>
  <text class="small" x="1348" y="504" text-anchor="middle">not owned by protocol_fee_vault</text>
  <rect class="rose" x="1192" y="616" width="312" height="90" rx="15"/>
  <text class="label" x="1348" y="650" text-anchor="middle">protocol_fee_vault is not project_treasury</text>
  <text class="small" x="1348" y="674" text-anchor="middle">separate authority and accounting surface</text>

  <line class="boundary" x1="1126" y1="150" x2="1126" y2="782"/>
  <path class="arrow" d="M284 278 H342"/>
  <path class="arrow-amber" d="M550 278 C586 278 588 207 614 207"/>
  <path class="arrow" d="M550 278 C586 278 588 385 614 385"/>
  <path class="arrow-amber" d="M725 254 V518"/>
  <path class="arrow-muted" d="M834 575 H884"/>
  <path class="arrow-green" d="M1348 344 V422"/>
  <path class="arrow-muted" d="M1192 480 H1128"/>
  <path class="arrow-muted" d="M1126 575 H1058"/>

  <rect class="card" x="86" y="860" width="1428" height="82" rx="18"/>
  <text class="lane-title" x="116" y="890">LEGEND / NOTE</text>
  <circle cx="124" cy="916" r="6" fill="#2563eb"/><text class="small" x="140" y="920">Holder output route: user_out</text>
  <circle cx="372" cy="916" r="6" fill="#d97706"/><text class="small" x="388" y="920">Protocol fee route: fee_out</text>
  <circle cx="634" cy="916" r="6" fill="#059669"/><text class="small" x="650" y="920">Project governance and treasury control</text>
  <text class="small" x="946" y="920">External/off-protocol project treasury is controlled by output_governance, not REDAX.</text>
</svg>
