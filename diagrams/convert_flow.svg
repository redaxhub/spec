<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">REDAX Hub holder conversion flow</title>
  <desc id="desc">Sequential Phase 1 convert_exact_in flow from holder input through validation, burn handling, output minting, fee routing, state update, and event emission.</desc>
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .title { fill: #0f172a; font: 700 26px Arial, sans-serif; }
      .subtitle { fill: #475569; font: 400 14px Arial, sans-serif; }
      .step { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; }
      .step-blue { fill: #eff6ff; stroke: #93c5fd; stroke-width: 1.8; }
      .step-green { fill: #ecfdf5; stroke: #86efac; stroke-width: 1.8; }
      .step-amber { fill: #fffbeb; stroke: #fcd34d; stroke-width: 1.8; }
      .rail { fill: #f8fafc; stroke: #e2e8f0; stroke-width: 1.5; }
      .label { fill: #0f172a; font: 700 14px Arial, sans-serif; }
      .body { fill: #475569; font: 400 12px Arial, sans-serif; }
      .num { fill: #ffffff; font: 700 12px Arial, sans-serif; }
      .note { fill: #334155; font: 700 12px Arial, sans-serif; letter-spacing: .04em; }
      .arrow { fill: none; stroke: #2563eb; stroke-width: 2.2; marker-end: url(#arrow); }
      .arrow-muted { fill: none; stroke: #64748b; stroke-width: 2; marker-end: url(#arrow-muted); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#2563eb" />
    </marker>
    <marker id="arrow-muted" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#64748b" />
    </marker>
  </defs>

  <rect class="bg" width="1200" height="620" />
  <text class="title" x="60" y="54">End-to-end conversion flow</text>
  <text class="subtitle" x="60" y="80">Phase 1 converts legacy tokens into SPL output tokens through one bounded Campaign PDA flow.</text>

  <rect class="rail" x="54" y="124" width="1092" height="346" rx="20" />
  <text class="note" x="80" y="156">convert_exact_in execution path</text>

  <g transform="translate(80 190)">
    <rect class="step-blue" width="130" height="120" rx="16" />
    <circle cx="24" cy="24" r="13" fill="#2563eb" />
    <text class="num" x="24" y="29" text-anchor="middle">1</text>
    <text class="label" x="65" y="52" text-anchor="middle">Holder</text>
    <text class="body" x="65" y="76" text-anchor="middle">starts convert</text>
    <text class="body" x="65" y="96" text-anchor="middle">with legacy input</text>
  </g>

  <g transform="translate(230 190)">
    <rect class="step" width="145" height="120" rx="16" />
    <circle cx="24" cy="24" r="13" fill="#2563eb" />
    <text class="num" x="24" y="29" text-anchor="middle">2</text>
    <text class="label" x="72" y="50" text-anchor="middle">Validate</text>
    <text class="body" x="72" y="74" text-anchor="middle">campaign live</text>
    <text class="body" x="72" y="94" text-anchor="middle">caps and mint</text>
  </g>

  <g transform="translate(395 190)">
    <rect class="step-amber" width="155" height="120" rx="16" />
    <circle cx="24" cy="24" r="13" fill="#d97706" />
    <text class="num" x="24" y="29" text-anchor="middle">3</text>
    <text class="label" x="78" y="50" text-anchor="middle">Handle legacy</text>
    <text class="body" x="78" y="74" text-anchor="middle">Phase 1 burn</text>
    <text class="body" x="78" y="94" text-anchor="middle">via campaign logic</text>
  </g>

  <g transform="translate(570 190)">
    <rect class="step" width="150" height="120" rx="16" />
    <circle cx="24" cy="24" r="13" fill="#2563eb" />
    <text class="num" x="24" y="29" text-anchor="middle">4</text>
    <text class="label" x="75" y="48" text-anchor="middle">Calculate</text>
    <text class="body" x="75" y="72" text-anchor="middle">gross output</text>
    <text class="body" x="75" y="92" text-anchor="middle">fee and dust</text>
  </g>

  <g transform="translate(740 190)">
    <rect class="step-blue" width="150" height="120" rx="16" />
    <circle cx="24" cy="24" r="13" fill="#2563eb" />
    <text class="num" x="24" y="29" text-anchor="middle">5</text>
    <text class="label" x="75" y="48" text-anchor="middle">Mint output</text>
    <text class="body" x="75" y="72" text-anchor="middle">Campaign PDA</text>
    <text class="body" x="75" y="92" text-anchor="middle">mints SPL token</text>
  </g>

  <g transform="translate(910 190)">
    <rect class="step-green" width="155" height="120" rx="16" />
    <circle cx="24" cy="24" r="13" fill="#059669" />
    <text class="num" x="24" y="29" text-anchor="middle">6</text>
    <text class="label" x="78" y="48" text-anchor="middle">Distribute</text>
    <text class="body" x="78" y="72" text-anchor="middle">net to holder</text>
    <text class="body" x="78" y="92" text-anchor="middle">fee to vault</text>
  </g>

  <path class="arrow" d="M210 250 H228" />
  <path class="arrow" d="M375 250 H393" />
  <path class="arrow" d="M550 250 H568" />
  <path class="arrow" d="M720 250 H738" />
  <path class="arrow" d="M890 250 H908" />

  <rect class="step" x="180" y="382" width="240" height="58" rx="14" />
  <text class="label" x="300" y="407" text-anchor="middle">State updates</text>
  <text class="body" x="300" y="428" text-anchor="middle">minted total, caps, dust accumulator</text>

  <rect class="step" x="470" y="382" width="240" height="58" rx="14" />
  <text class="label" x="590" y="407" text-anchor="middle">Event emission</text>
  <text class="body" x="590" y="428" text-anchor="middle">off-chain indexers reconstruct activity</text>

  <rect class="step-green" x="760" y="382" width="240" height="58" rx="14" />
  <text class="label" x="880" y="407" text-anchor="middle">Final result</text>
  <text class="body" x="880" y="428" text-anchor="middle">irreversible conversion complete</text>

  <path class="arrow-muted" d="M815 310 V354 C815 372 590 360 590 380" />
  <path class="arrow-muted" d="M650 310 V354 C650 372 300 360 300 380" />
  <path class="arrow-muted" d="M710 412 H758" />

  <rect x="72" y="508" width="1056" height="64" rx="16" fill="#f8fafc" stroke="#cbd5e1" />
  <text class="note" x="96" y="536">Phase 1 boundaries</text>
  <text class="body" x="96" y="558">SingleProjectMigration only. ProgramCreatedOutputMint only. MetaplexMetadataCPI only. freeze_authority = None. SPL Token output only.</text>
</svg>
